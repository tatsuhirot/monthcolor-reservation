name: HPB Calendar Automation

on:
  schedule:
    # 毎時00分に実行 (JST = UTC+9)
    - cron: '0 * * * *'
  workflow_dispatch:   # GitHub UI から手動実行可能

jobs:
  # ── Job 1: 予約キュー処理（pending → SalonBoard 登録） ───────────────
  process-queue:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright (Firefox only)
        run: npx playwright install firefox --with-deps

      - name: Restore SalonBoard session
        run: |
          mkdir -p .state
          echo "${{ secrets.SALONBOARD_SESSION }}" | base64 -d > .state/salonboard.json
          echo "✅ session restored"

      - name: Process reservation queue
        env:
          SALONBOARD_LOGIN_ID:   ${{ secrets.SALONBOARD_LOGIN_ID }}
          SALONBOARD_PASSWORD:   ${{ secrets.SALONBOARD_PASSWORD }}
          BLOB_READ_WRITE_TOKEN: ${{ secrets.BLOB_READ_WRITE_TOKEN }}
          PROXY_SERVER:          ${{ secrets.PROXY_SERVER }}
          PROXY_USERNAME:        ${{ secrets.PROXY_USERNAME }}
          PROXY_PASSWORD:        ${{ secrets.PROXY_PASSWORD }}
          PLAYWRIGHT_HEADLESS:   'true'
        run: node worker.js

  # ── Job 2: SalonBoard 空き枠同期（毎時） ───────────────────────────
  sync-slots:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright (Firefox only)
        run: npx playwright install firefox --with-deps

      - name: Restore SalonBoard session
        run: |
          mkdir -p .state
          echo "${{ secrets.SALONBOARD_SESSION }}" | base64 -d > .state/salonboard.json
          echo "✅ session restored"

      - name: Sync SalonBoard slots
        env:
          SALONBOARD_LOGIN_ID:   ${{ secrets.SALONBOARD_LOGIN_ID }}
          SALONBOARD_PASSWORD:   ${{ secrets.SALONBOARD_PASSWORD }}
          BLOB_READ_WRITE_TOKEN: ${{ secrets.BLOB_READ_WRITE_TOKEN }}
          PROXY_SERVER:          ${{ secrets.PROXY_SERVER }}
          PROXY_USERNAME:        ${{ secrets.PROXY_USERNAME }}
          PROXY_PASSWORD:        ${{ secrets.PROXY_PASSWORD }}
          PLAYWRIGHT_HEADLESS:   'true'
        run: node sync_slots.js
