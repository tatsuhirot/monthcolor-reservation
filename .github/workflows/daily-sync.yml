name: HPB Calendar Automation

on:
  schedule:
    # 予約キュー処理: 10分ごと (JST = UTC+9)
    - cron: '*/10 * * * *'
    # SalonBoard 空き枠同期: 毎日 09:00 JST (00:00 UTC)
    - cron: '0 0 * * *'
    # SalonBoard 空き枠同期: 毎日 13:00 JST (04:00 UTC)
    - cron: '0 4 * * *'
  workflow_dispatch:   # GitHub UI から手動実行可能

jobs:
  # ── Job 1: 予約キュー処理（pending → SalonBoard 登録） ───────────────
  process-queue:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright (Firefox only)
        run: npx playwright install firefox --with-deps

      - name: Process reservation queue
        env:
          SALONBOARD_LOGIN_ID:   ${{ secrets.SALONBOARD_LOGIN_ID }}
          SALONBOARD_PASSWORD:   ${{ secrets.SALONBOARD_PASSWORD }}
          BLOB_READ_WRITE_TOKEN: ${{ secrets.BLOB_READ_WRITE_TOKEN }}
          PLAYWRIGHT_HEADLESS:   'true'
        run: node worker.js

  # ── Job 2: SalonBoard 空き枠同期（1日2回） ───────────────────────────
  sync-slots:
    # 00:00 UTC (09:00 JST) か 04:00 UTC (13:00 JST) のスケジュール時のみ実行
    # 10分ごとのトリガーでは実行しない
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'schedule' &&
       (startsWith(github.event.schedule, '0 0') || startsWith(github.event.schedule, '0 4')))
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright (Firefox only)
        run: npx playwright install firefox --with-deps

      - name: Sync SalonBoard slots
        env:
          SALONBOARD_LOGIN_ID:   ${{ secrets.SALONBOARD_LOGIN_ID }}
          SALONBOARD_PASSWORD:   ${{ secrets.SALONBOARD_PASSWORD }}
          BLOB_READ_WRITE_TOKEN: ${{ secrets.BLOB_READ_WRITE_TOKEN }}
        run: node sync_slots.js
